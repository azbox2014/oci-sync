name: Cronjob for Sync Image

on:
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * *"
  pull_request:
    branches:
      - 'main'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger list
        env:
          HI_REGISTRY: ${{ secrets.HI_REGISTRY }}
          QCR_REGISTRY: ${{ secrets.QCR_REGISTRY }}
          FLAT_REGISTRY: ${{ secrets.FLAT_REGISTRY }}
        shell: bash
        run: |
          set -ex

          cat -n $0
          . func.sh
          len=$(jq '. | length' image-list.json)
          for idx in $(seq 0 $((len-1))); do
          
            SRC="$(jq -r '.['${idx}'].image' image-list.json)"
            tagReg="$(jq -r '.['${idx}'].tagReg' image-list.json)"
            
            latest1=$(skopeo list-tags --creds ${{ secrets.HI_CREDS }} docker://$(transform_oci_image_url flat ${SRC}) | grep -E "'"${tagReg}"'" | sort -Vr | head -n 1)
            latest2=$(skopeo list-tags docker://${SRC} | grep -E "'"${tagReg}"'" | sort -Vr | head -n 1)
            echo ${latest1}
            echo ${latest2}
          done
